name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  # ── 1. Verify tag matches pyproject.toml version ────────────────────────────
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check tag matches pyproject.toml version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(grep '^version' pyproject.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag $TAG does not match pyproject.toml version $PKG"
            exit 1
          fi

  # ── 2. Build sdist + wheel ──────────────────────────────────────────────────
  build:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Build
        run: uv build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ── 3. Publish to TestPyPI ──────────────────────────────────────────────────
  publish-testpypi:
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  # ── 4. Smoke test from TestPyPI ─────────────────────────────────────────────
  smoke-test:
    needs: publish-testpypi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Inspect wheel contents
        run: unzip -l dist/*.whl

      - uses: astral-sh/setup-uv@v5

      - name: Install from wheel artifact
        run: uv pip install --system dist/*.whl

      - name: Smoke test
        run: |
          python -c "import pyesql; print('version:', pyesql.__version__)"
          python -c "
          from pyesql import parse
          from pyesql.schema import Schema
          from pyesql.validator import SchemaValidator

          # Basic parse
          q = parse('FROM logs-* | WHERE host.name == \"web-01\" | LIMIT 10')
          print('parse:  OK —', type(q.source).__name__, '+', len(q.pipes), 'pipe(s)')

          # Schema validation
          schema = Schema.from_dict({'host.name': 'keyword', 'event.action': 'keyword'})
          parse('FROM logs | WHERE host.name == \"web-01\"', schema=schema)
          print('schema: OK')

          # Computed field tracking (EVAL + GROK named capture)
          from pyesql.validator import collect_computed_fields
          q2 = parse('FROM logs | EVAL doubled = bytes * 2 | GROK message \"(?<capture>.+)\"')
          computed = collect_computed_fields(q2)
          assert 'doubled' in computed and 'capture' in computed, f'missing computed fields: {computed}'
          print('computed fields: OK —', sorted(computed))
          "

  # ── 5. Publish to PyPI (requires environment approval) ─────────────────────
  publish-pypi:
    needs: smoke-test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1